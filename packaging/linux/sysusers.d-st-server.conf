# systemd-sysusers(8) drop-in: install as /usr/lib/sysusers.d/st-server.conf
# Creates the `st` system user that the st-server.service unit runs as.
# The service unit adds video/render/input as SupplementaryGroups, so we
# only need the primary user+group here.
u st - "st-server system user" /var/lib/st-server
