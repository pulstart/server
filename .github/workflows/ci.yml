name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            package_id: linux-x64
          - name: macOS x64
            os: macos-15-intel
            package_id: macos-x64
          - name: macOS arm64
            os: macos-15
            package_id: macos-arm64

    steps:
      - name: Checkout server with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.PROTOCOL_CHECKOUT_TOKEN || github.token }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libdrm-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libswresample-dev \
            libswscale-dev \
            libwayland-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxtst-dev \
            pkg-config

      - name: Build release
        run: cargo build --release --locked

      - name: Package Unix artifact
        run: bash ./scripts/package-unix.sh --platform ${{ matrix.package_id }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_id }}
          path: dist/*-${{ matrix.package_id }}.*
          if-no-files-found: error
          retention-days: 14
