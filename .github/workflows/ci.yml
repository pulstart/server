name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FFMPEG_VERSION: "8.0"
  FFMPEG_BUILD_TAG: "latest"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build_kind: unix
            package_id: linux-x64
          - name: macOS x64
            os: macos-15-intel
            build_kind: unix
            package_id: macos-x64
          - name: macOS arm64
            os: macos-15
            build_kind: unix
            package_id: macos-arm64
          - name: Windows x64
            os: windows-2022
            build_kind: windows
            package_id: windows-x64

    steps:
      - name: Checkout server with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.PROTOCOL_CHECKOUT_TOKEN || github.token }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libdrm-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libswresample-dev \
            libswscale-dev \
            libwayland-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxtst-dev \
            pkg-config

      - name: Cache pre-built FFmpeg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ffmpeg-prebuilt
          key: ${{ runner.os }}-ffmpeg-${{ env.FFMPEG_VERSION }}-${{ env.FFMPEG_BUILD_TAG }}

      - name: Install Windows FFmpeg SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegZip = "ffmpeg-n${{ env.FFMPEG_VERSION }}-${{ env.FFMPEG_BUILD_TAG }}-win64-lgpl-shared-${{ env.FFMPEG_VERSION }}.zip"
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/${{ env.FFMPEG_BUILD_TAG }}/$ffmpegZip"
          $downloadDir = "${{ github.workspace }}\ffmpeg-prebuilt"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          $zipPath = "$downloadDir\$ffmpegZip"
          if (-not (Test-Path $zipPath)) {
            Write-Host "Downloading $ffmpegUrl ..."
            Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          }
          Expand-Archive -Path $zipPath -DestinationPath $downloadDir -Force
          $extractedDir = Get-ChildItem -Path $downloadDir -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          echo "FFMPEG_DIR=$($extractedDir.FullName)" >> $env:GITHUB_ENV
          Write-Host "FFmpeg extracted to $($extractedDir.FullName)"

      - name: Build Unix release
        if: matrix.build_kind == 'unix'
        run: cargo build --release --locked

      - name: Package Unix artifact
        if: matrix.build_kind == 'unix'
        run: bash ./scripts/package-unix.sh --platform ${{ matrix.package_id }}

      - name: Build Windows release
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\build-windows-msvc.ps1 -Configuration release -Platform ${{ matrix.package_id }} -FfmpegDir "${{ env.FFMPEG_DIR }}"

      - name: Package Windows artifact
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\package-windows-release.ps1 -Configuration release -Platform ${{ matrix.package_id }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_id }}
          path: dist/*-${{ matrix.package_id }}.*
          if-no-files-found: error
          retention-days: 14
